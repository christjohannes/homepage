<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f3f3;
            font-family: 'Montserrat', Arial, sans-serif;
        }
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .profile-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid black;
            margin: 0 auto;
        }
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .name {
            margin-top: 20px;
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }
        .subtitle {
            margin-top: 8px;
            font-size: 22px;
            font-weight: 400;
            color: #666;
            min-height: 1.4em;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: #666;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.75s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }
        .social-links {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Montserrat', Arial, sans-serif;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.10);
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 14px rgba(0,0,0,0.15);
            opacity: 0.92;
        }
        .btn-bluesky  { background-color: #0085ff; color: #fff; }
        .btn-linkedin { background-color: #0a66c2; color: #fff; }
        .btn-github   { background-color: #24292e; color: #fff; }
        .bio {
            margin-top: 20px;
            max-width: 320px;
            font-size: 16px;
            color: #555;
            line-height: 1.85;
            letter-spacing: 0.01em;
            font-family: 'Montserrat', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-circle">
            <img src="image/profile.png" alt="Profile Photo">
        </div>
        <h2 class="name">Johannes Christ</h2>
        <p class="subtitle"><span id="typewriter"></span><span class="cursor"></span></p>
        <p class="bio">Ich arbeite als Redakteur für das RedaktionsNetzwerk Deutschland (RND). Mein Arbeitsmaterial sind Daten, die ich sammle, ordne, untersuche, visualisiere und ihre Geschichte erzähle.</p>

        <div class="social-links">
            <!-- Bluesky -->
            <a href="https://bsky.app/profile/jchrist.bsky.social" target="_blank" rel="noopener" class="social-btn btn-bluesky">
                <svg width="18" height="18" viewBox="0 0 360 320" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M180 142c-15-37-56-95-100-118C36 4 0 16 0 62c0 10 6 84 10 96 13 45 57 57 97 50-68 12-84 50-47 88 70 72 101-18 120-68 19 50 50 140 120 68 37-38 21-76-47-88 40 7 84-5 97-50C354 146 360 72 360 62 360 16 324 4 280 24c-44 23-85 81-100 118z" fill="white"/>
                </svg>
                Bluesky
            </a>
            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/johannes-christ-36241962/" target="_blank" rel="noopener" class="social-btn btn-linkedin">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.35-1.85 3.58 0 4.25 2.36 4.25 5.43v6.31zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45C23.21 24 24 23.23 24 22.27V1.73C24 .77 23.21 0 22.22 0z"/>
                </svg>
                LinkedIn
            </a>
            <!-- GitHub -->
            <a href="https://github.com/christjohannes" target="_blank" rel="noopener" class="social-btn btn-github">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </a>
        </div>
    </div>

    <script>
        const text = "Datenjournalist";
        const el = document.getElementById("typewriter");
        let i = 0;

        function type() {
            if (i < text.length) {
                el.textContent += text[i];
                i++;
                setTimeout(type, 100);
            }
        }

        setTimeout(type, 600);
    </script>
</body>
</html>
